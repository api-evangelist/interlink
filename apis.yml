aid: interlink
name: Interlink
description: >-
  Interlink is a virtual kubelet implementation that enables cross-cluster
  communication and resource sharing in Kubernetes, allowing pods in one cluster
  to access services in another cluster as if they were local. It provides
  multi-cluster networking and service mesh capabilities.
