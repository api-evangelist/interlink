aid: interlink
name: Interlink
description: >-
  interLink is an abstraction layer that extends the Kubernetes Virtual Kubelet
  interface, enabling pods to execute on remote resources such as HPC batch
  systems (SLURM, HTCondor), virtual machines, remote Kubernetes clusters, and
  serverless platforms. It comprises a Virtual Kubelet that converts pod
  execution requests into remote API calls and a modular interLink API Server
  with provider-specific sidecar plugins, with built-in OpenTelemetry
  observability, TLS/mTLS, and OAuth2 authentication.
